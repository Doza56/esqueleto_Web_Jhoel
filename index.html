<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto IISI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid rgba(99,179,237,0.2);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(120deg, #63b3ed, #9f7aea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .tag {
      background: rgba(99,179,237,0.1);
      border: 1px solid rgba(99,179,237,0.25);
      color: #63b3ed;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    footer {
      margin-top: 2rem;
      color: #475569;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🚀</div>
    <h1>Proyecto IISI</h1>
    <p>Ingeniería en Sistemas de Información — Trabajo académico 2026.</p>
    <div class="tags">
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">GitHub</span>
      <span class="tag">Vercel</span>
    </div>
  </div>

  <footer>© 2026 Proyecto IISI · Todos los derechos reservados</footer>

</body>
</html>
